  create_release:
    runs-on: ubuntu-latest
    needs: [build_mac, build_mac_arm64, build_linux_amd64, build_linux_arm64, package_windows]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Extract tag
      id: extract_tag
      run: |
        echo "TAG=${{ inputs.tag }}" >> $GITHUB_ENV
        VERSION="${{ inputs.tag }}"
        VERSION="${VERSION#v}"
        DEB_VERSION="${VERSION/-alpha/~alpha}"
        DEB_VERSION="${DEB_VERSION/-beta/~beta}"
        DEB_VERSION="${DEB_VERSION/-rc/~rc}"
        echo "DEB_TAG=${DEB_VERSION}" >> $GITHUB_ENV

    - name: Create dist directory
      run: mkdir -p dist

    - name: Prepare release notes
      run: |
        cp ReleaseNotes.md ./dist/ReleaseNotes.md
        sed -i "s/_TAG_/${TAG}/g" ./dist/ReleaseNotes.md

    # one single download for each of the job needs, in the same order
    - name: Download build_mac_artifacts
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/download-artifact@v7
      with:
        name: build_mac_artifacts
        path: ./dist

    - name: Download build_mac_arm64_artifacts
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/download-artifact@v7
      with:
        name: build_mac_arm64_artifacts
        path: ./dist

    - name: Download Linux amd64 artifacts
      if: ${{ env.BUILD_LINUX == 'true' }}
      uses: actions/download-artifact@v7
      with:
        name: build_linux_amd64_artifacts
        path: ./dist

    - name: Download Linux arm64 artifacts
      if: ${{ env.BUILD_RASPBERRY == 'true' }}
      uses: actions/download-artifact@v7
      with:
        name: build_linux_arm64_artifacts
        path: ./dist

    - name: Download package_windows_artifacts
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      uses: actions/download-artifact@v7
      with:
        name: package_windows_artifacts
        path: ./dist

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        if [[ "${TAG}" == *"-"* ]]; then
          gh release create ${{ env.TAG }} \
            --title "owlcms Control Panel ${{ env.TAG }}" \
            --notes-file ./dist/ReleaseNotes.md \
            --prerelease
        else
          gh release create ${{ env.TAG }} \
            --title "owlcms Control Panel ${{ env.TAG }}" \
            --notes-file ./dist/ReleaseNotes.md
        fi

    - name: Release macOS arm64 DMG
      if: ${{ env.BUILD_MAC == 'true' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ env.TAG }} dist/macOS_OWLCMS.dmg

    - name: Release macOS amd64 DMG
      if: ${{ env.BUILD_MAC == 'true' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ env.TAG }} dist/macOS_Intel_OWLCMS.dmg

    - name: Checkout Homebrew tap
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/checkout@v6
      with:
        repository: owlcms/homebrew-brew
        ref: main
        path: homebrew-brew
        token: ${{ secrets.OWLCMS_ORG_TOKEN }}

    - name: Update Homebrew cask metadata
      id: update_homebrew_cask
      if: ${{ env.BUILD_MAC == 'true' }}
      shell: bash
      env:
        TAP_DIR: ${{ github.workspace }}/homebrew-brew
      run: |
        set -euo pipefail

        if [[ ! "${TAG}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-alpha[0-9]*|-beta[0-9]*|-rc[0-9]*)?$ ]]; then
          echo "Invalid release tag: ${TAG}" >&2
          exit 1
        fi

        if [[ "${TAG}" == *"-"* ]]; then
          cask_name="controlpanel-prerelease"
        else
          cask_name="controlpanel"
        fi
        cask_path="Casks/${cask_name}.rb"
        cask_file="${TAP_DIR}/${cask_path}"

        test -f "${cask_file}"
        test -f "${GITHUB_WORKSPACE}/dist/macOS_OWLCMS.dmg"
        test -f "${GITHUB_WORKSPACE}/dist/macOS_Intel_OWLCMS.dmg"

        arm_sha="$(sha256sum "${GITHUB_WORKSPACE}/dist/macOS_OWLCMS.dmg" | awk '{print $1}')"
        intel_sha="$(sha256sum "${GITHUB_WORKSPACE}/dist/macOS_Intel_OWLCMS.dmg" | awk '{print $1}')"

        sed -i -E "s|^  version \".*\"$|  version \"${TAG}\"|" "${cask_file}"
        sed -i -E "/^  on_arm do$/,/^  end$/ s|^    sha256 \".*\"$|    sha256 \"${arm_sha}\"|" "${cask_file}"
        sed -i -E "/^  on_intel do$/,/^  end$/ s|^    sha256 \".*\"$|    sha256 \"${intel_sha}\"|" "${cask_file}"

        grep -Fqx "  version \"${TAG}\"" "${cask_file}"
        sed -n '/^  on_arm do$/,/^  end$/p' "${cask_file}" | grep -Fqx "    sha256 \"${arm_sha}\""
        sed -n '/^  on_intel do$/,/^  end$/p' "${cask_file}" | grep -Fqx "    sha256 \"${intel_sha}\""

        versioned_cask_name="controlpanel@${TAG#v}"
        versioned_cask_path="Casks/${versioned_cask_name}.rb"
        versioned_cask_file="${TAP_DIR}/${versioned_cask_path}"
        cp "${cask_file}" "${versioned_cask_file}"
        sed -i -E "s|^cask \".*\" do$|cask \"${versioned_cask_name}\" do|" "${versioned_cask_file}"
        sed -i -E "s|^  name \".*\"$|  name \"OWLCMS Control Panel ${TAG}\"|" "${versioned_cask_file}"
        sed -i -E "s|^  desc \".*\"$|  desc \"Control panel for OWLCMS weightlifting competitions\"|" "${versioned_cask_file}"

        grep -Fqx "cask \"${versioned_cask_name}\" do" "${versioned_cask_file}"
        grep -Fqx "  version \"${TAG}\"" "${versioned_cask_file}"

        echo "cask_name=${cask_name}" >> "${GITHUB_OUTPUT}"
        echo "cask_path=${cask_path}" >> "${GITHUB_OUTPUT}"
        echo "versioned_cask_path=${versioned_cask_path}" >> "${GITHUB_OUTPUT}"
        if git -C "${TAP_DIR}" diff --quiet -- "${cask_path}" "${versioned_cask_path}"; then
          echo "changed=false" >> "${GITHUB_OUTPUT}"
        else
          echo "changed=true" >> "${GITHUB_OUTPUT}"
        fi

    - name: Validate Homebrew cask
      if: ${{ env.BUILD_MAC == 'true' }}
      shell: bash
      env:
        TAP_DIR: ${{ github.workspace }}/homebrew-brew
        CASK_PATH: ${{ steps.update_homebrew_cask.outputs.cask_path }}
        VERSIONED_CASK_PATH: ${{ steps.update_homebrew_cask.outputs.versioned_cask_path }}
      run: |
        set -euo pipefail
        git -C "${TAP_DIR}" diff --check
        ruby -c "${TAP_DIR}/${CASK_PATH}"
        ruby -c "${TAP_DIR}/${VERSIONED_CASK_PATH}"

    - name: Commit Homebrew cask update
      if: ${{ env.BUILD_MAC == 'true' && steps.update_homebrew_cask.outputs.changed == 'true' }}
      shell: bash
      env:
        TAP_DIR: ${{ github.workspace }}/homebrew-brew
        CASK_NAME: ${{ steps.update_homebrew_cask.outputs.cask_name }}
        CASK_PATH: ${{ steps.update_homebrew_cask.outputs.cask_path }}
        VERSIONED_CASK_PATH: ${{ steps.update_homebrew_cask.outputs.versioned_cask_path }}
      run: |
        set -euo pipefail
        git -C "${TAP_DIR}" config user.name "github-actions[bot]"
        git -C "${TAP_DIR}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git -C "${TAP_DIR}" add -- "${CASK_PATH}" "${VERSIONED_CASK_PATH}"
        git -C "${TAP_DIR}" commit -m "Update ${CASK_NAME} to ${TAG}"
        git -C "${TAP_DIR}" push origin HEAD:main

    - name: Release Raspberry Pi DEB package
      if: ${{ env.BUILD_RASPBERRY == 'true' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ env.TAG }} dist/Raspberry_Pi_arm64_Control_Panel_Installer.deb

    - name: Release Linux Intel DEB package
      if: ${{ env.BUILD_LINUX == 'true' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ env.TAG }} dist/Linux_Control_Panel_Installer.deb

    - name: Release Windows installer
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ env.TAG }} dist/Windows_Control_Panel_Installer.exe

