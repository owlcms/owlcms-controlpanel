          mv usr/local/share/pixmaps/owlcms.png usr/share/pixmaps/
        fi
        if [ -f usr/local/share/applications/owlcms.desktop ]; then
          mv usr/local/share/applications/owlcms.desktop usr/share/applications/
        fi
        rm -rf usr/local/share/pixmaps usr/local/share/applications
        for bindir in usr/local/bin usr/bin; do
          primary=""
          for candidate in owlcms-launcher owlcms controlpanel; do
            if [ -x "$bindir/$candidate" ] && [ ! -L "$bindir/$candidate" ]; then
