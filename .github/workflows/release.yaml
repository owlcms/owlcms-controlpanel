name: Release owlcms-controlpanel

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., 1.9.0, 1.9.0-beta1)'
        required: true
        type: string

env:
  BUILD_MAC: true
  BUILD_WINDOWS: true
  BUILD_RASPBERRY: true
  BUILD_LINUX: true

jobs:
  build_mac:
    runs-on: macos-15-intel
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      CGO_CFLAGS: "-mmacosx-version-min=13.0"
      CGO_LDFLAGS: "-mmacosx-version-min=13.0"

    steps:
    - name: Checkout code
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/checkout@v6

    - name: Set up Go
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.5'

    - name: Install gh CLI
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        brew install gh

    - name: Extract tag
      id: extract_tag
      run: |
        echo "TAG=${{ inputs.tag }}" >> $GITHUB_ENV

    - name: Substitute tag in config.go
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        # use this approach because we can't easily set ldflags in fyne-cross
        sed -i '' "s/_TAG_/${TAG}/g" shared/version.go

    - name: Install fyne
      if: ${{ env.BUILD_MAC == 'true' }}
      run: go install fyne.io/fyne/v2/cmd/fyne@latest

    - name: Install appdmg
      if: ${{ env.BUILD_MAC == 'true' }}
      run: npm install -g appdmg

    - name: Build for macOS amd64
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        export GOOS=darwin
        export GOARCH=amd64
        export CGO_ENABLED=1
        mkdir -p build
        go build -o build/owlcms .

    - name: Package for macOS amd64
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        rm -rf owlcms.app
        fyne package -os darwin -icon Icon.png -name owlcms -executable build/owlcms

    - name: Move macOS amd64 app to dist directory
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        rm -rf dist/darwin-amd64
        mkdir -p dist/darwin-amd64
        mv owlcms.app dist/darwin-amd64/

    - name: Hide macOS DMG shortcut extension for amd64
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        SetFile -a E "dist/Double-click if you get an error message when starting.webloc"

    - name: Create DMG for macOS amd64
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        mkdir -p artifacts
        appdmg dist/appdmg_amd64.json artifacts/macOS_Intel_OWLCMS.dmg

    - name: Upload macOS amd64 DMG
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: build_mac_artifacts
        path: artifacts/*

  build_mac_arm64:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      CGO_CFLAGS: "-mmacosx-version-min=13.0"
      CGO_LDFLAGS: "-mmacosx-version-min=13.0"

    steps:
    - name: Checkout code
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/checkout@v6

    - name: Set up Go
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.5'

    - name: Extract tag
      id: extract_tag
      run: |
        echo "TAG=${{ inputs.tag }}" >> $GITHUB_ENV

    - name: Substitute tag in config.go
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        # use this approach because we can't easily set ldflags in fyne-cross
        sed -i '' "s/_TAG_/${TAG}/g" shared/version.go

    - name: Install fyne
      if: ${{ env.BUILD_MAC == 'true' }}
      run: go install fyne.io/fyne/v2/cmd/fyne@latest

    - name: Install appdmg
      if: ${{ env.BUILD_MAC == 'true' }}
      run: npm install -g appdmg

    - name: Build for macOS arm64
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        export GOOS=darwin
        export GOARCH=arm64
        export CGO_ENABLED=1
        mkdir -p build
        go build -o build/owlcms .

    - name: Package for macOS arm64
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        rm -rf owlcms.app
        fyne package -os darwin -icon Icon.png -name owlcms -executable build/owlcms

    - name: Move macOS arm64 app to dist directory
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        rm -rf dist/darwin-arm64
        mkdir -p dist/darwin-arm64
        mv owlcms.app dist/darwin-arm64/

    - name: Hide macOS DMG shortcut extension for arm64
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        SetFile -a E "dist/Double-click if you get an error message when starting.webloc"

    - name: Create DMG for macOS arm64
      if: ${{ env.BUILD_MAC == 'true' }}
      run: |
        mkdir -p artifacts
        appdmg dist/appdmg_arm64.json artifacts/macOS_OWLCMS.dmg

    - name: Upload macOS arm64 DMG
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: build_mac_arm64_artifacts
        path: artifacts/*

  build_windows_crosscompile:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      uses: actions/checkout@v6

    - name: Set up Go
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.5'

    - name: Install fyne-cross
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      run: |
        go install github.com/fyne-io/fyne-cross@v1.6.2
        echo "${HOME}/go/bin" >> $GITHUB_PATH

    - name: Extract tag
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      run: |
        echo "TAG=${{ inputs.tag }}" >> $GITHUB_ENV

    - name: Substitute tag in config.go
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      run: |
        sed -i "s/_TAG_/${TAG}/g" shared/version.go

    - name: Build for Windows
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      run: |
        fyne-cross windows -arch amd64 -app-id app.owlcms.controlpanel -name owlcms -debug
        mkdir -p artifacts
        mv fyne-cross/bin/windows-amd64/owlcms.exe artifacts/owlcms.exe

    - name: Upload Windows build artifact
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: build_windows_artifacts
        path: artifacts/*

  build_linux_amd64:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      if: ${{ env.BUILD_LINUX == 'true' }}
      uses: actions/checkout@v6

    - name: Set up Go
      if: ${{ env.BUILD_LINUX == 'true' }}
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.5'

    - name: Install build dependencies
      if: ${{ env.BUILD_LINUX == 'true' }}
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libgl1-mesa-dev libegl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev ruby-full
        sudo gem install --no-document fpm
        go install fyne.io/fyne/v2/cmd/fyne@v2.8.0
        echo "${HOME}/go/bin" >> $GITHUB_PATH
        echo "$(gem environment gemdir)/bin" >> $GITHUB_PATH

    - name: Extract tag
      if: ${{ env.BUILD_LINUX == 'true' }}
      run: |
        echo "TAG=${{ inputs.tag }}" >> $GITHUB_ENV
        version="${{ inputs.tag }}"
        version="${version#v}"
        version="${version/-alpha/~alpha}"
        version="${version/-beta/~beta}"
        version="${version/-rc/~rc}"
        echo "DEB_TAG=${version}" >> $GITHUB_ENV

    - name: Substitute tag in config.go
      if: ${{ env.BUILD_LINUX == 'true' }}
      run: sed -i "s/_TAG_/${TAG}/g" shared/version.go

    - name: Build native Linux amd64 package
      if: ${{ env.BUILD_LINUX == 'true' }}
      run: fyne package --os linux --icon Icon.png --name owlcms

    - name: Normalize Linux package paths
      if: ${{ env.BUILD_LINUX == 'true' }}
      run: |
        mkdir -p /tmp/fix-amd64
        cd /tmp/fix-amd64
        tar -xf "${GITHUB_WORKSPACE}/owlcms.tar.xz" --strip-components=1
        mkdir -p usr/share/pixmaps usr/share/applications
        if [ -f usr/local/share/pixmaps/owlcms.png ]; then
          mv usr/local/share/pixmaps/owlcms.png usr/share/pixmaps/
        fi
        if [ -f usr/local/share/applications/owlcms.desktop ]; then
          mv usr/local/share/applications/owlcms.desktop usr/share/applications/
        fi
        rm -rf usr/local/share/pixmaps usr/local/share/applications
        for bindir in usr/local/bin usr/bin; do
          primary=""
          for candidate in owlcms-launcher owlcms controlpanel; do
            if [ -x "$bindir/$candidate" ] && [ ! -L "$bindir/$candidate" ]; then
              primary="$candidate"
              break
            fi
          done
          if [ -n "$primary" ]; then
            if [ "$primary" != "owlcms" ]; then
              ln -sfn "$primary" "$bindir/owlcms"
            fi
            if [ "$primary" != "controlpanel" ]; then
              ln -sfn "$primary" "$bindir/controlpanel"
            fi
          fi
        done
        rm -f Makefile
        tar -cJf "${GITHUB_WORKSPACE}/owlcms.tar.xz" .

    - name: Create Linux Intel DEB package
      if: ${{ env.BUILD_LINUX == 'true' }}
      run: |
        fpm -s tar -t deb -n owlcms-launcher -v "${DEB_TAG}" -a amd64 --prefix / \
          --after-install ./dist/after_install_amd64.sh \
          --after-remove ./dist/after_remove.sh \
          ./owlcms.tar.xz
        mkdir -p artifacts
        mv "owlcms-launcher_${DEB_TAG}_amd64.deb" artifacts/Linux_Control_Panel_Installer.deb

    - name: Upload Linux amd64 artifact
      if: ${{ env.BUILD_LINUX == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: build_linux_amd64_artifacts
        path: artifacts/*

  build_linux_arm64:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: Checkout code
