    - name: Normalize Linux package paths
      if: ${{ env.BUILD_RASPBERRY == 'true' }}
      run: |
        mkdir -p /tmp/fix-arm64
        cd /tmp/fix-arm64
        tar -xf "${GITHUB_WORKSPACE}/owlcms.tar.xz" --strip-components=1
