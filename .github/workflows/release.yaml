            fi
          fi
        done
        rm -f Makefile
        tar -cJf "${GITHUB_WORKSPACE}/owlcms.tar.xz" .

    - name: Create Raspberry Pi DEB package
      if: ${{ env.BUILD_RASPBERRY == 'true' }}
      run: |
        fpm -s tar -t deb -n owlcms-launcher -v "${DEB_TAG}" -a arm64 --prefix / \
          --after-install ./dist/after_install.sh \
          --after-remove ./dist/after_remove.sh \
          ./owlcms.tar.xz
        mkdir -p artifacts
        mv "owlcms-launcher_${DEB_TAG}_arm64.deb" artifacts/Raspberry_Pi_arm64_Control_Panel_Installer.deb

    - name: Upload Linux arm64 artifact
      if: ${{ env.BUILD_RASPBERRY == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: build_linux_arm64_artifacts
        path: artifacts/*

  package_windows:
    runs-on: windows-latest
    needs: build_windows_crosscompile

    steps:
    - name: Checkout code
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      uses: actions/checkout@v6

    - name: Extract tag
      id: extract_tag
      shell: bash
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      run: |
        tag="${{ inputs.tag }}"
        deb_tag="${tag#v}"
        deb_tag="${deb_tag/-alpha/~alpha}"
        deb_tag="${deb_tag/-beta/~beta}"
        deb_tag="${deb_tag/-rc/~rc}"
        echo "TAG=$tag" >> $GITHUB_ENV
        echo "DEB_TAG=${deb_tag}" >> $GITHUB_ENV
        echo "Extracted TAG=$tag"

    - name: Verify gh CLI
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      run: gh --version

    - name: Download Windows build artifact
      if: ${{ env.BUILD_WINDOWS == 'true' }}
      uses: actions/download-artifact@v7
      with:
        name: build_windows_artifacts
        path: ./dist

    # - name: Install MakeAppx
